<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Gear Icon - Settings/Advanced Mode -->
  
  <g fill="#4A90E2">
    <!-- Main gear body -->
    <circle cx="50" cy="50" r="25"/>
    
    <!-- Gear teeth (8 teeth, evenly spaced) -->
    <!-- Top (0°) -->
    <rect x="44.7" y="18" width="10.7" height="10" rx="2"/>
    <!-- Top-right (45°) -->
    <rect x="44.7" y="18" width="10.7" height="10" rx="2" transform="rotate(45, 50, 50)"/>
    <!-- Right (90°) -->
    <rect x="44.7" y="18" width="10.7" height="10" rx="2" transform="rotate(90, 50, 50)"/>
    <!-- Bottom-right (135°) -->
    <rect x="44.7" y="18" width="10.7" height="10" rx="2" transform="rotate(135, 50, 50)"/>
    <!-- Bottom (180°) -->
    <rect x="44.7" y="18" width="10.7" height="10" rx="2" transform="rotate(180, 50, 50)"/>
    <!-- Bottom-left (225°) -->
    <rect x="44.7" y="18" width="10.7" height="10" rx="2" transform="rotate(225, 50, 50)"/>
    <!-- Left (270°) -->
    <rect x="44.7" y="18" width="10.7" height="10" rx="2" transform="rotate(270, 50, 50)"/>
    <!-- Top-left (315°) -->
    <rect x="44.7" y="18" width="10.7" height="10" rx="2" transform="rotate(315, 50, 50)"/>
  </g>
  
  <!-- Center hole (transparent - cut out from gear) -->
  <circle cx="50" cy="50" r="16" fill="#333333"/>
  
</svg>
