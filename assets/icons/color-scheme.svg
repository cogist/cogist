<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Color Wheel Icon - 8 segments using default color scheme -->
  
  <!-- Segment 1: Red (0-45°) -->
  <path d="M 50 50 L 50 8 A 42 42 0 0 1 79.7 20.3 Z" fill="#EE3848"/>
  
  <!-- Segment 2: Orange (45-90°) -->
  <path d="M 50 50 L 79.7 20.3 A 42 42 0 0 1 92 50 Z" fill="#F48333"/>
  
  <!-- Segment 3: Yellow (90-135°) -->
  <path d="M 50 50 L 92 50 A 42 42 0 0 1 79.7 79.7 Z" fill="#F1CF27"/>
  
  <!-- Segment 4: Green (135-180°) -->
  <path d="M 50 50 L 79.7 79.7 A 42 42 0 0 1 50 92 Z" fill="#18DC6A"/>
  
  <!-- Segment 5: Teal (180-225°) -->
  <path d="M 50 50 L 50 92 A 42 42 0 0 1 20.3 79.7 Z" fill="#14D0C1"/>
  
  <!-- Segment 6: Blue (225-270°) -->
  <path d="M 50 50 L 20.3 79.7 A 42 42 0 0 1 8 50 Z" fill="#2A9CED"/>
  
  <!-- Segment 7: Purple (270-315°) -->
  <path d="M 50 50 L 8 50 A 42 42 0 0 1 20.3 20.3 Z" fill="#8540E7"/>
  
  <!-- Segment 8: Pink (315-360°) -->
  <path d="M 50 50 L 20.3 20.3 A 42 42 0 0 1 50 8 Z" fill="#EA2E8C"/>
  
  <!-- Center hole (white circle) -->
  <circle cx="50" cy="50" r="18" fill="#FFFFFF"/>
  
</svg>
