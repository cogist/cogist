name: Build and Release

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v0.5.0
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write  # Required for creating releases

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            platform: linux
            artifact_name: Cogist-Linux
            executable_name: Cogist
          - os: windows-latest
            platform: windows
            artifact_name: Cogist-Windows
            executable_name: Cogist.exe
          - os: macos-latest
            platform: macos
            artifact_name: Cogist-macOS
            executable_name: Cogist

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          uv sync --frozen

      - name: Install PyInstaller and Pillow
        run: |
          uv pip install pyinstaller pillow

      - name: Build executable (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          uv run pyinstaller \
            --name=Cogist \
            --onefile \
            --windowed \
            --add-data="assets:assets" \
            --icon=assets/icons/cogist.png \
            main.py

      - name: Build executable (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          uv run pyinstaller `
            --name=Cogist `
            --onefile `
            --windowed `
            --add-data="assets;assets" `
            --icon=assets/icons/cogist.png `
            main.py

      - name: Build executable (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          uv run pyinstaller \
            --name=Cogist \
            --onefile \
            --windowed \
            --add-data="assets:assets" \
            --icon=assets/icons/cogist.png \
            main.py

      - name: Create archive (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cp dist/Cogist ${{ matrix.artifact_name }}
          chmod +x ${{ matrix.artifact_name }}

      - name: Create archive (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          Compress-Archive -Path dist\Cogist.exe -DestinationPath ${{ matrix.artifact_name }}.zip

      - name: Create archive (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          cp dist/Cogist ${{ matrix.artifact_name }}
          chmod +x ${{ matrix.artifact_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            ${{ matrix.artifact_name }}
            *.zip
          retention-days: 30

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: |
          ls -la artifacts/
          find artifacts/ -type f

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/Cogist-Linux/Cogist-Linux
            artifacts/Cogist-Windows/Cogist-Windows.zip
            artifacts/Cogist-macOS/Cogist-macOS
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
