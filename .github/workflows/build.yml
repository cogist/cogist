name: Build and Release

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v0.5.0
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write  # Required for creating releases

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-13]
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x64
            artifact_name: Cogist-Linux-x64
          - os: windows-latest
            platform: windows
            arch: x64
            artifact_name: Cogist-Windows-x64
          - os: macos-13
            platform: macos
            arch: arm64
            artifact_name: Cogist-macOS-arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          uv sync --frozen

      - name: Install PyInstaller and Pillow
        run: |
          uv pip install pyinstaller pillow

      - name: Build executable (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          uv run pyinstaller \
            --name=Cogist \
            --onefile \
            --windowed \
            --add-data="assets:assets" \
            --icon=assets/icons/cogist.png \
            main.py

      - name: Build executable (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          uv run pyinstaller `
            --name=Cogist `
            --onefile `
            --windowed `
            --add-data="assets;assets" `
            --icon=assets/icons/cogist.png `
            main.py

      - name: Build executable (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          uv run pyinstaller \
            --name=Cogist \
            --windowed \
            --add-data="assets:assets" \
            --icon=assets/icons/cogist.png \
            main.py

      - name: Create archive (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cp dist/Cogist ${{ matrix.artifact_name }}.AppImage
          chmod +x ${{ matrix.artifact_name }}.AppImage

      - name: Create package (Windows - Portable)
        if: matrix.os == 'windows-latest'
        run: |
          Copy-Item dist\Cogist.exe ${{ matrix.artifact_name }}-Portable.exe

      - name: Install Inno Setup
        if: matrix.os == 'windows-latest'
        run: |
          choco install innosetup --no-progress -y

      - name: Create installer (Windows - Setup)
        if: matrix.os == 'windows-latest'
        run: |
          $issContent = @"
          [Setup]
          AppName=Cogist
          AppVersion=$env:GITHUB_REF_NAME
          DefaultDirName={pf}\Cogist
          DefaultGroupName=Cogist
          OutputDir=.
          OutputBaseFilename=${{ matrix.artifact_name }}-Setup
          Compression=lzma
          SolidCompression=yes
          
          [Files]
          Source: "dist\Cogist.exe"; DestDir: "{app}"; Flags: ignoreversion
          
          [Icons]
          Name: "{group}\Cogist"; Filename: "{app}\Cogist.exe"
          Name: "{commondesktop}\Cogist"; Filename: "{app}\Cogist.exe"
          
          [UninstallDelete]
          Type: filesandordirs; Name: "{app}"
          "@
          
          Set-Content -Path setup.iss -Value $issContent -Encoding UTF8
          
          & 'C:\Program Files (x86)\Inno Setup 6\ISCC.exe' setup.iss

      - name: Create archive (macOS)
        if: matrix.platform == 'macos'
        run: |
          # PyInstaller creates .app bundle on macOS with --windowed
          # Create a temporary directory with .app and Applications symlink
          mkdir -p dmg_root
          cp -R dist/Cogist.app dmg_root/
          ln -s /Applications dmg_root/Applications
          
          # Create DMG with proper structure
          hdiutil create -volname Cogist -srcfolder dmg_root -ov -format UDZO ${{ matrix.artifact_name }}.dmg
          
          # Clean up
          rm -rf dmg_root

      - name: Debug - List built files
        shell: bash
        run: |
          echo "=== Current directory ==="
          pwd || cd
          echo "=== Files matching pattern ==="
          ls -la ${{ matrix.artifact_name }}-* 2>/dev/null || echo "No files found matching pattern!"
          echo "=== All files in current dir ==="
          ls -la

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            ${{ matrix.artifact_name }}.AppImage
            ${{ matrix.artifact_name }}-Portable.exe
            ${{ matrix.artifact_name }}-Setup.exe
            ${{ matrix.artifact_name }}.dmg
          retention-days: 30

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: |
          echo "=== Artifacts directory structure ==="
          ls -laR artifacts/
          echo "\n=== All files ==="
          find artifacts/ -type f || echo "No files found!"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGELOG.md
          files: |
            artifacts/**/*.AppImage
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
