name: Build and Release

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v0.5.0
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write  # Required for creating releases

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            platform: linux
            artifact_name: Cogist-Linux
            executable_name: Cogist
          - os: windows-latest
            platform: windows
            artifact_name: Cogist-Windows
            executable_name: Cogist.exe
          - os: macos-latest
            platform: macos
            artifact_name: Cogist-macOS
            executable_name: Cogist

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          uv sync --frozen

      - name: Install PyInstaller and Pillow
        run: |
          uv pip install pyinstaller pillow

      - name: Build executable (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          uv run pyinstaller \
            --name=Cogist \
            --onefile \
            --windowed \
            --add-data="assets:assets" \
            --icon=assets/icons/cogist.png \
            main.py

      - name: Build executable (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          uv run pyinstaller `
            --name=Cogist `
            --onefile `
            --windowed `
            --add-data="assets;assets" `
            --icon=assets/icons/cogist.png `
            main.py

      - name: Build executable (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          uv run pyinstaller \
            --name=Cogist \
            --windowed \
            --add-data="assets:assets" \
            --icon=assets/icons/cogist.png \
            main.py

      - name: Create archive (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cp dist/Cogist ${{ matrix.artifact_name }}.AppImage
          chmod +x ${{ matrix.artifact_name }}.AppImage

      - name: Create package (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          Copy-Item dist\Cogist.exe ${{ matrix.artifact_name }}.exe

      - name: Create archive (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          # PyInstaller creates .app bundle on macOS with --windowed
          hdiutil create -volname Cogist -srcfolder dist/Cogist.app -ov -format UDZO ${{ matrix.artifact_name }}.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            ${{ matrix.artifact_name }}.*
          retention-days: 30

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: |
          echo "=== Artifacts directory structure ==="
          ls -la artifacts/
          echo "\n=== All files ==="
          find artifacts/ -type f || echo "No files found!"
          echo "\n=== Check each platform ==="
          ls -la artifacts/Cogist-Linux/ 2>/dev/null || echo "Linux artifact not found"
          ls -la artifacts/Cogist-Windows/ 2>/dev/null || echo "Windows artifact not found"
          ls -la artifacts/Cogist-macOS/ 2>/dev/null || echo "macOS artifact not found"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGELOG.md
          files: |
            artifacts/**/*.AppImage
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
